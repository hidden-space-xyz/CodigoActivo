# HTTP: SPA + API reverse proxy. TLS (if any) terminates at an upstream proxy.
map $http_x_forwarded_proto $codigoactivo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# HSTS only for requests that reached the edge over TLS; browsers ignore the
# header on plain-HTTP responses anyway, and an empty map value omits it.
map $codigoactivo_forwarded_proto $codigoactivo_hsts {
    https   "max-age=31536000; includeSubDomains";
    default "";
}

# Best-effort per-IP abuse limits (429 beyond the burst). Keyed by client
# address after realip resolution (see set_real_ip_from below).
limit_req_zone $binary_remote_addr zone=codigoactivo_api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=codigoactivo_auth:10m rate=30r/m;
limit_req_status 429;

server {
    listen 8080;
    server_name _;
    server_tokens off;
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    root  /usr/share/nginx/html;
    index index.html;

    # In the documented topology a TLS-terminating proxy fronts this container,
    # so the TCP peer is a private/Docker address and every client would share
    # one rate-limit bucket. Recover the real client from X-Forwarded-For when
    # the peer is private; public peers are untrusted and their header ignored.
    # Caveat: if this container is ever exposed DIRECTLY to the internet,
    # Docker's NAT still presents a private peer, letting clients spoof the
    # header to dodge rate limits — in that setup remove these directives or
    # scope set_real_ip_from to the actual proxy address.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.0/8;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    absolute_redirect off;
    port_in_redirect  off;

    client_max_body_size  12m;
    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          30s;

    include /etc/nginx/snippets/security-headers.conf;

    # The app only ever uses these methods.
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript text/javascript application/json application/xml image/svg+xml application/manifest+json;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Root SEO files are generated by the API. Exact matches resolve before the
    # regex phase, so the auth limiter is unaffected; no add_header here so the
    # server-level security headers inherit.
    # The include must precede the rewrite: "break" stops rewrite-module
    # processing, and the snippet's "set $upstream_api" is a rewrite directive.
    location = /sitemap.xml {
        limit_req zone=codigoactivo_api burst=100 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        rewrite ^ /api/sitemap.xml break;
    }

    location = /robots.txt {
        limit_req zone=codigoactivo_api burst=100 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
        rewrite ^ /api/robots.txt break;
    }

    # Credential endpoints (login, register, OTP verify, resend verification,
    # forgot/reset password) share a strict brute-force limit. Case-insensitive
    # and unanchored on purpose: ASP.NET routing also matches /LOGIN and
    # /login/, and this regex must win over the /api/ prefix location for all
    # variants.
    location ~* ^/api/auth/(login|register|forgot-password|[^/]+/(verify|resend-verification|reset-password)) {
        limit_req zone=codigoactivo_auth burst=15 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # Not ^~: that would skip the regex phase and disable the auth limiter.
    location /api/ {
        limit_req zone=codigoactivo_api burst=100 nodelay;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    location ^~ /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;

        # Never serve dotfiles (nested so it cannot shadow the /api locations).
        location ~ /\. {
            return 404;
        }
    }

    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri /index.html;

        # Never serve dotfiles (nested so it cannot shadow the /api locations).
        location ~ /\. {
            return 404;
        }
    }
}
