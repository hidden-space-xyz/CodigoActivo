# HTTP: SPA + API reverse proxy.
map $http_x_forwarded_proto $codigoactivo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    root  /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript text/javascript application/json application/xml image/svg+xml application/manifest+json;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $codigoactivo_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
