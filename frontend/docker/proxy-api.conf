# Shared reverse-proxy setup for the API, included by every /api location.
# proxy_pass through a variable defers DNS resolution to request time (via the
# server-level resolver), so nginx starts even if the api container is down.
set $upstream_api http://api:8080;
proxy_pass $upstream_api;
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $codigoactivo_forwarded_proto;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Connection        "";
proxy_hide_header X-Powered-By;
proxy_connect_timeout   5s;
proxy_request_buffering off;
proxy_read_timeout      300s;
proxy_send_timeout      300s;
