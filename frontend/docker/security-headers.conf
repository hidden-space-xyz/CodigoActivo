# Security headers shared by every location. `add_header` directives are NOT
# inherited into a location that declares its own `add_header`, so this file
# must be re-included there (e.g. the locations that set Cache-Control).
add_header X-Content-Type-Options             nosniff always;
add_header X-Frame-Options                    DENY always;
add_header Referrer-Policy                    strict-origin-when-cross-origin always;
add_header X-Permitted-Cross-Domain-Policies  none always;
add_header Permissions-Policy                 "accelerometer=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), serial=(), usb=()" always;
add_header Cross-Origin-Opener-Policy         same-origin always;
add_header Cross-Origin-Resource-Policy       same-origin always;

# Only emitted when the request arrived over TLS (empty value omits the header).
add_header Strict-Transport-Security $codigoactivo_hsts always;

# 'unsafe-inline' in style-src is required by Vue :style bindings and the
# styles PrimeVue injects at runtime; Google Fonts serves the font CSS.
# blob: in img-src covers thumbnail previews (URL.createObjectURL). The app
# uses no frames, workers, media or manifest, so those fall to 'none'.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'none'; worker-src 'none'; media-src 'none'; manifest-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
