# Applied at server level and re-included wherever a location sets its own add_header.
add_header X-Content-Type-Options    "nosniff"                              always;
add_header X-Frame-Options           "SAMEORIGIN"                           always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains"  always;
# script-src hashes cover the inline theme bootstrap in index.html (LF and CRLF).
add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'sha256-6xqGv3idoUwCjsjXFq4juLlpJQQBN4jMFCp+8jiUtYE=' 'sha256-CdNGUIEWdUmXVvso/7crHwNBfdqa97CSfynntGfDhzs='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
