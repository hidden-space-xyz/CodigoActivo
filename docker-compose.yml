name: codigoactivo

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codigoactivo}
      POSTGRES_USER: ${POSTGRES_USER:-codigoactivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codigoactivo} -d ${POSTGRES_DB:-codigoactivo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: [no-new-privileges:true]

  api:
    build:
      context: ./backend
      dockerfile: src/CodigoActivo.API/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-codigoactivo}
      POSTGRES_USER: ${POSTGRES_USER:-codigoactivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Madrid}
      DEMO_MODE: ${DEMO_MODE:-false}
      AUTH_SAMESITE: ${AUTH_SAMESITE:-Lax}
      FILE_STORAGE_ROOT: /app/files
      ACCOUNT_VERIFICATION_REQUIRED: ${ACCOUNT_VERIFICATION_REQUIRED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURITY: ${SMTP_SECURITY:-StartTls}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Código Activo}
    volumes:
      - api-files:/app/files
      - api-logs:/app/logs
      - api-dataprotection:/home/app/.aspnet/DataProtection-Keys
    networks: [backend, frontend]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    networks: [frontend]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  db-data:
  api-files:
  api-logs:
  api-dataprotection:
